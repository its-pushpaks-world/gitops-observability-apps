# update /etc/otelcol-contrib/config.yaml with this file
receivers:
  hostmetrics:
    collection_interval: 15s
    scrapers:
      cpu:
      memory:

  prometheus:
    config:
      scrape_configs:
        - job_name: 'tomcat-app'
          scrape_interval: 15s
          static_configs:
            - targets: ['127.0.0.1:9404']

  filelog:
    include: 
      - /var/log/syslog
      - /var/log/tomcat9/*.log
      - /var/log/tomcat9/*.out
    start_at: end

processors:
  batch:
    timeout: 5s

  # 1. Hardcodes a "job" label so you can filter by this specific EC2 server
  resource:
    attributes:
      - key: job
        value: "tomcat-ec2"
        action: insert

  # 2. Extracts the hidden file path from OTel and turns it into a searchable Loki label
  groupbyattrs:
    keys:
      - log.file.path
# -------------------------------

exporters:
  prometheusremotewrite:
    endpoint: "http://10.0.1.167:9009/api/v1/push"
    headers:
      X-Scope-OrgID: "tenant-tomcat"

  loki:
    endpoint: "http://10.0.1.167:3100/loki/api/v1/push"
    headers:
      X-Scope-OrgID: "tenant-tomcat"

service:
  pipelines:
    metrics:
      # Added 'resource' here so your metrics also get the job="tomcat-ec2" label
      receivers: [hostmetrics, prometheus]
      processors: [resource, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [filelog]
      # MUST add the new processors here so the labels are attached before shipping to Loki
      processors: [resource, groupbyattrs, batch]
      exporters: [loki]
