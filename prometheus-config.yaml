global:
  scrape_interval: 15s

# Push the scraped metrics directly into Mimir
remote_write:
  - url: http://mimir:9009/api/v1/push
    headers:
      X-Scope-OrgID: tenant-tomcat

# Scrape the containers themselves
scrape_configs:
  - job_name: 'observability-stack'
    static_configs:
      - targets: ['mimir:9009', 'loki:3100', 'grafana:3000']
