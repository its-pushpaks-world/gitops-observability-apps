multitenancy_enabled: true

# The common block configures the shared storage properties for all components
common:
  storage:
    backend: local
    local:
      directory: /tmp/mimir

# This block now only needs to point to the local paths without re-declaring the backend type
blocks_storage:
  bucket_store:
    sync_dir: /tmp/mimir/tsdb-sync
  tsdb:
    dir: /tmp/mimir/tsdb

compactor:
  data_dir: /tmp/mimir/compactor

ingester:
  ring:
    kvstore:
      store: memberlist
