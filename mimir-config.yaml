multitenancy_enabled: true

# Runs all components in a single process
target: all

# Tells the storage layer to use the local disk instead of S3/Cloud
blocks_storage:
  backend: filesystem
  tsdb:
    dir: /tmp/mimir/tsdb
  bucket_store:
    sync_dir: /tmp/mimir/tsdb-sync
  filesystem:
    dir: /tmp/mimir/data/tsdb

compactor:
  data_dir: /tmp/mimir/compactor

# Simple in-memory setup for single-instance mode
ingester:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1

# Direct paths for local rule and alert storage
ruler_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/data/rules

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /tmp/mimir/data/alerts
