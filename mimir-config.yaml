multitenancy_enabled: true

# Target parameters for single-binary monolithic execution
target: all

# Explicitly setup metadata server storage
ingester:
  ring:
    kvstore:
      store: memberlist
    replication_factor: 1

# Explicit block engine configuration mapping directly to the disk
blocks_storage:
  backend: local
  local:
    directory: /tmp/mimir/blocks
  bucket_store:
    sync_dir: /tmp/mimir/tsdb-sync
  tsdb:
    dir: /tmp/mimir/tsdb

compactor:
  data_dir: /tmp/mimir/compactor

# Explicitly assign local store for the Alertmanager engine to satisfy the unmarshaler
alertmanager:
  data_dir: /tmp/mimir/alertmanager
  storage:
    backend: local
    local:
      directory: /tmp/mimir/alerts

# Explicitly assign local store for the Ruler engine
ruler:
  data_dir: /tmp/mimir/ruler
  storage:
    backend: local
    local:
      directory: /tmp/mimir/rules
